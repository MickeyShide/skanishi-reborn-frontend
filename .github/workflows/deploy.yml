name: Deploy frontend

on:
  push:
    branches:
      - main
      - prod
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy
        required: true
        default: test
        type: choice
        options:
          - test
          - prod

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'prod' && 'prod' || 'test') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${GITHUB_SHA}"
          echo "name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "ref=${image_name}:${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            VITE_YMAP_API_KEY=${{ vars.VITE_YMAP_API_KEY }}
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.name }}:latest

      - name: Write deploy env
        shell: bash
        run: |
          cat > .env.deploy <<'EOF'
          FRONTEND_IMAGE=${{ steps.image.outputs.ref }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          EOF

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/deploy_key <<'EOF'
          ${{ secrets.SERVER_PRIVATE_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose files
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p '${{ vars.DEPLOY_PATH }}'"
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml \
            .env.deploy \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ vars.DEPLOY_PATH }}/"

      - name: Deploy on server
        shell: bash
        run: |
          ssh -T -i ~/.ssh/deploy_key "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'EOF'
          set -euxo pipefail
          cd '${{ vars.DEPLOY_PATH }}'
          mv .env.deploy .env
          echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          docker compose pull
          
          docker compose rm -f -s frontend     # остановить и удалить контейнер
          docker compose up -d --wait frontend # создать новый
          docker compose ps -a
          docker image prune -f
          EOF
