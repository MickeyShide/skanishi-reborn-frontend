services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_YMAP_API_KEY=local-ymaps-key
      - VITE_API_URL=http://localhost:4000
      - VITE_DEV_BACKEND_URL=http://host.docker.internal:4000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
